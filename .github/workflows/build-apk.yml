name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create web directory and copy files
        run: |
          mkdir -p www
          cp index.html style.css script.js sw.js manifest.json www/
          cp icon-192.png icon-512.png icon.svg www/
          # Fix manifest for APK (remove GitHub Pages path)
          sed -i 's|/CABATA1/|./|g' www/manifest.json
          # Fix service worker path for APK
          sed -i "s|'/CABATA1/sw.js'|'sw.js'|g" www/script.js

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.joel.blip",
            "appName": "Blip IP Checker",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Init and add Android
        run: |
          npx cap init "Blip IP Checker" "com.joel.blip" --web-dir www
          npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blip-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
